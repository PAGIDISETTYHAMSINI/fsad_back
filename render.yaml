services:
  # The Spring Boot Backend
  - type: web
    name: sustainable-backend
    env: docker
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sustainable-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: sustainable-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sustainable-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 8080

databases:
  - name: sustainable-db
    plan: free
    databaseName: sustainable_living
    user: admin
